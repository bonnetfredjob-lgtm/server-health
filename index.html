<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Santé des serveurs</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;

        /* 🌿 Fond feuillage */
        background-image: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;

        /* Couche sombre pour lisibilité */
        background-color: rgba(0,0,0,0.4);
        background-blend-mode: darken;
    }

    h1 {
        margin-top: 30px;
        font-size: 2.2em;
        color: white;
    }

    .site-box {
        width: 400px;
        margin: 40px auto;
        background: rgba(255,255,255,0.85);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        text-align: left;
    }

    .site-title {
        font-size: 1.4em;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
        color: #333;
    }

    .server {
        display: flex;
        align-items: center;
        margin: 10px 0;
        font-size: 1.1em;
    }

    .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        margin-right: 10px;
        transition: transform 0.3s ease;
    }

    /* 🟢 Vert */
    .green { background: #28a745; }

    /* 🔴 Rouge + animation pulsation */
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .red {
        background: #dc3545;
        animation: pulse 1.2s infinite;
    }

    .timestamp {
        margin-left: auto;
        font-size: 0.9em;
        color: #666;
    }
</style>
</head>

<body>

<h1>Santé des serveurs</h1>

<div class="site-box">
    <div class="site-title">Ste Marie</div>
    <div id="servers"></div>
</div>

<script>
async function refreshStatus() {
    const response = await fetch("https://healthpreview.bonnetfredjob.workers.dev/status");
    const data = await response.json();

    const container = document.getElementById("servers");
    container.innerHTML = "";

    const now = Date.now();

    for (const [server, timestamp] of Object.entries(data)) {

        // ❌ On ignore le serveur "test"
        if (server.toLowerCase() === "test") continue;

        const lastPing = new Date(timestamp).getTime();
        const diffMinutes = (now - lastPing) / 60000;

        const isUp = diffMinutes < 10; // < 10 minutes = vert

        const div = document.createElement("div");
        div.className = "server";

        div.innerHTML = `
            <div class="dot ${isUp ? "green" : "red"}"></div>
            <span>${server}</span>
            <span class="timestamp">${diffMinutes.toFixed(1)} min</span>
        `;

        container.appendChild(div);
    }
}

// Rafraîchit toutes les 30 secondes
refreshStatus();
setInterval(refreshStatus, 30000);
</script>

</body>
</html>
