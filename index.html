<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Santé des serveurs</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;

        /* 🍃 Fond feuillage naturel */
        background-image: url("cute-cartoon-mushroom-illustration.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;

        /* Couche sombre pour lisibilité */
        background-color: rgba(0,0,0,0.45);
        background-blend-mode: darken;
    }

    h1 {
        margin-top: 30px;
        font-size: 2.2em;
        color: white;
    }

    /* Disposition par défaut : portrait → cadres empilés */
    .container {
        display: flex;
        flex-direction: column;   /* empile les cadres */
        align-items: center;
        gap: 40px;
        margin-top: 30px;
    }

    /* Mode paysage → cadres côte à côte */
    @media (orientation: landscape) {
        .container {
            flex-direction: row;  /* place les cadres côte à côte */
            justify-content: center;
        }
    }

    .site-box {
        width: 400px;
        background: rgba(255,255,255,0.85);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        text-align: left;
    }

    .site-title {
        font-size: 1.4em;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
        color: #333;
    }

    .server {
        display: flex;
        align-items: center;
        margin: 10px 0;
        font-size: 1.1em;
    }

    .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        margin-right: 10px;
        transition: transform 0.3s ease;
    }

    /* 🟢 Vert */
    .green { background: #28a745; }

    /* 🔴 Rouge + animation pulsation */
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .red {
        background: #dc3545;
        animation: pulse 1.2s infinite;
    }

    .timestamp {
        margin-left: auto;
        font-size: 0.9em;
        color: #666;
    }

    #status-image-container {
    margin-top: 40px;
    display: flex;
    justify-content: center;
    }
    
    #status-image {
        width: 300px;
        max-width: 80%;
    }
    
</style>
</head>

<body>

<h1>Santé des serveurs</h1>

<div class="container">

    <!-- Cadre Carlo Acutis -->
    <div class="site-box">
        <div class="site-title">Carlo Acutis</div>
        <div id="servers-CA"></div>
    </div>

    <!-- Cadre Ste Marie -->
    <div class="site-box">
        <div class="site-title">Ste Marie</div>
        <div id="servers-SM"></div>
    </div>

    <!-- Cadre St Louis -->
    <div class="site-box">
        <div class="site-title">St Louis</div>
        <div id="servers-SL"></div>
    </div>

</div>

<script>
async function refreshStatus() {
    const response = await fetch("https://healthpreview.bonnetfredjob.workers.dev/status");
    const data = await response.json();

    const now = Date.now();

    const boxSM = document.getElementById("servers-SM");
    const boxCA = document.getElementById("servers-CA");
    const boxSL = document.getElementById("servers-SL");

    boxSM.innerHTML = "";
    boxCA.innerHTML = "";
    boxSL.innerHTML = "";

    let redCount = 0; // Compteur de voyants rouges

    for (const [server, timestamp] of Object.entries(data)) {

        if (server.toLowerCase() === "test") continue;

        const lastPing = new Date(timestamp).getTime();
        const diffMinutes = (now - lastPing) / 60000;
        const isUp = diffMinutes < 32;

        if (!isUp) redCount++; // On compte les rouges

        const div = document.createElement("div");
        div.className = "server";

        div.innerHTML = `
            <div class="dot ${isUp ? "green" : "red"}"></div>
            <span>${server}</span>
            <span class="timestamp">${diffMinutes.toFixed(1)} min</span>
        `;

        if (server.startsWith("CA")) {
            boxCA.appendChild(div);
        } else if (server.startsWith("SM")) {
            boxSM.appendChild(div);
        } else if (server.startsWith("SL")) {
            boxSL.appendChild(div);
        }
    }

    // 🎯 Mise à jour de l'image selon le nombre de rouges
    const img = document.getElementById("status-image");

    if (redCount === 0) {
        img.src = "ChampiHappy.png";
    } else if (redCount === 1) {
        img.src = "ChampiInquiet1.png";
    } else if (redCount === 2) {
        img.src = "ChampiInquiet2.png";
    } else if (redCount === 3) {
        img.src = "ChampiPleure1.png";
    } else {
        img.src = "ChampiPleure2.png";
    }
}

refreshStatus();
setInterval(refreshStatus, 30000);
</script>
    
    <div id="status-image-container">
        <img id="status-image" src="" alt="État général" />
    </div>
    
</body>
</html>
